# Build cloud APK Husko Client sur Linux (fallback si eas build depuis Windows echoue en phase Prepare / tar).
# Prerequis : secret EXPO_TOKEN (https://expo.dev/accounts/[compte]/settings/access-tokens)
name: EAS APK Client

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Android APK (apk-client)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Meme eas-cli que en local (devDependency + package-lock), pas de version flottante latest.
      - name: EAS build (wait for completion)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npm exec -- eas build --platform android --profile apk-client --non-interactive
